<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Finanzas · José & Desi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e;
    --jose: #e8c97d; --desi: #7db8e8;
    --text: #f0ede8; --muted: #888; --danger: #e87d7d; --success: #2ecc71;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding-bottom: 100px; min-height: 100vh; }
  header { padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
  .app-title { font-family: 'DM Serif Display', serif; font-size: 24px; }
  .status-dot { font-size: 10px; text-align: center; color: var(--muted); margin-bottom: 10px; }

  .summary-table { margin: 0 20px 20px; width: calc(100% - 40px); border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; font-size: 13px; }
  .summary-table th, .summary-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .val-jose { color: var(--jose); font-family: 'DM Mono'; }
  .val-desi { color: var(--desi); font-family: 'DM Mono'; }

  .tabs { display: grid; grid-template-columns: 1fr 1fr; margin: 0 20px 20px; background: var(--surface); border-radius: 10px; padding: 4px; }
  .tab-btn { border: none; padding: 10px; background: transparent; color: var(--muted); border-radius: 8px; font-weight: bold; cursor: pointer; }
  .tab-btn.active { background: var(--bg); color: var(--text); }

  .panel { margin: 0 20px; background: var(--surface); padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
  input, select { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); width: 100%; margin-bottom: 10px; font-size: 16px; outline: none; }
  
  .person-sel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
  .p-btn { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); cursor: pointer; font-weight: bold; }
  .p-btn.active-jose { border-color: var(--jose); color: var(--jose); background: rgba(232,201,125,0.1); }
  .p-btn.active-desi { border-color: var(--desi); color: var(--desi); background: rgba(125,184,232,0.1); }

  .add-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; background: var(--success); color: #000; }
  .add-btn:disabled { opacity: 0.5; }
  
  .list-container { padding: 20px; }
  .item { background: var(--surface); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid transparent; }
  .item.g-jose { border-left-color: var(--jose); }
  .item.g-desi { border-left-color: var(--desi); }
</style>
</head>
<body>

<header>
  <div class="app-title">Finanzas Familiares</div>
  <select id="month-filter" style="width: auto; margin:0" onchange="sync()"></select>
</header>

<div id="sync-status" class="status-dot">🔄 Sincronizando...</div>

<table class="summary-table">
  <thead><tr><th>Concepto</th><th>José</th><th>Desi</th><th>Total</th></tr></thead>
  <tbody>
    <tr><td>Ingresos</td><td id="in-jose" class="val-jose">$0</td><td id="in-desi" class="val-desi">$0</td><td id="in-total" style="font-weight:bold">$0</td></tr>
    <tr><td>Gastos</td><td id="out-jose" class="val-jose">$0</td><td id="out-desi" class="val-desi">$0</td><td id="out-total" style="font-weight:bold">$0</td></tr>
  </tbody>
</table>

<div class="tabs">
  <button class="tab-btn active" id="tab-g" onclick="switchTab('gastos')">GASTOS</button>
  <button class="tab-btn" id="tab-i" onclick="switchTab('ingresos')">INGRESOS</button>
</div>

<div id="panel-gastos" class="panel">
  <div class="person-sel">
    <button class="p-btn active-jose" id="pg-jose" onclick="setPerson('jose')">José</button>
    <button class="p-btn" id="pg-desi" onclick="setPerson('desi')">Desi</button>
  </div>
  <input type="text" id="g-desc" placeholder="¿Qué compraste?">
  <input type="number" id="g-amount" placeholder="Monto $" inputmode="decimal">
  <select id="g-cat">
    <option value="🍔 Comida Calle">🍔 Comida Calle</option>
    <option value="🛒 Súper">🛒 Súper</option>
    <option value="🚗 Chevy">🚗 Chevy</option>
    <option value="📺 Suscripciones">📺 Suscripciones</option>
    <option value="💡 Servicios">💡 Servicios</option>
    <option value="🏥 Salud">🏥 Salud</option>
    <option value="📚 Educación">📚 Educación</option>
    <option value="👤 G. Personales">👤 G. Personales</option>
    <option value="📱 Publicidad TikTok">📱 Publicidad TikTok</option>
    <option value="🙏 Diezmo/Ofrenda">🙏 Diezmo/Ofrenda</option>
    <option value="🌀 Otros">🌀 Otros</option>
  </select>
  <button class="add-btn" id="btn-g" onclick="addGasto()">Registrar Gasto</button>
</div>

<div id="panel-ingresos" class="panel" style="display:none">
  <div class="person-sel">
    <button class="p-btn active-jose" id="pi-jose" onclick="setPerson('jose')">José</button>
    <button class="p-btn" id="pi-desi" onclick="setPerson('desi')">Desi</button>
  </div>
  <input type="text" id="i-concept" placeholder="Concepto de ingreso">
  <input type="number" id="i-amount" placeholder="Monto $" inputmode="decimal">
  <button class="add-btn" id="btn-i" style="background: var(--desi)" onclick="addIngreso()">Registrar Ingreso</button>
</div>

<div id="main-list" class="list-container"></div>

<script>
  const URL = "https://script.google.com/macros/s/AKfycbyBhXZ8n1O6fyXh4EGNXIJN8-QixT7pWtSqD9imWc81Z6sSNLPefNyidmT5E_EMCUz4/exec";
  let data = { gastos: [], ingresos: [] };
  let currentTab = 'gastos';
  let user = 'jose';

  const monthFilter = document.getElementById('month-filter');
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  months.forEach((m,i) => {
    let opt = document.createElement('option'); opt.value = i; opt.textContent = m;
    if(i === new Date().getMonth()) opt.selected = true;
    monthFilter.appendChild(opt);
  });

  function switchTab(t) {
    currentTab = t;
    document.getElementById('tab-g').className = t === 'gastos' ? 'tab-btn active' : 'tab-btn';
    document.getElementById('tab-i').className = t === 'ingresos' ? 'tab-btn active' : 'tab-btn';
    document.getElementById('panel-gastos').style.display = t === 'gastos' ? 'block' : 'none';
    document.getElementById('panel-ingresos').style.display = t === 'ingresos' ? 'block' : 'none';
    render();
  }

  function setPerson(p) {
    user = p;
    document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active-jose','active-desi'));
    document.getElementById(`pg-${p}`).classList.add(`active-${p}`);
    document.getElementById(`pi-${p}`).classList.add(`active-${p}`);
  }

  async function sync() {
    const status = document.getElementById('sync-status');
    status.textContent = "🔄 Sincronizando...";
    try {
      const resp = await fetch(URL + "?t=" + Date.now());
      data = await resp.json();
      render();
      status.textContent = "✅ Conectado";
    } catch(e) { status.textContent = "❌ Error de Red"; }
  }

  async function addGasto() {
    const desc = document.getElementById('g-desc').value;
    const amount = document.getElementById('g-amount').value;
    if(!desc || !amount) return;
    document.getElementById('btn-g').disabled = true;
    const body = { action:'add', id:Date.now(), person:user, desc, amount, cat:document.getElementById('g-cat').value, date:new Date().toLocaleDateString('es-MX') };
    await fetch(URL, { method:'POST', mode:'no-cors', body: JSON.stringify(body) });
    document.getElementById('g-desc').value = ''; document.getElementById('g-amount').value = '';
    document.getElementById('btn-g').disabled = false;
    setTimeout(sync, 1500);
  }

  async function addIngreso() {
    const concept = document.getElementById('i-concept').value;
    const amount = document.getElementById('i-amount').value;
    if(!concept || !amount) return;
    document.getElementById('btn-i').disabled = true;
    const body = { action:'add_ingreso', id:Date.now(), person:user, concept, amount, date:new Date().toLocaleDateString('es-MX') };
    await fetch(URL, { method:'POST', mode:'no-cors', body: JSON.stringify(body) });
    document.getElementById('i-concept').value = ''; document.getElementById('i-amount').value = '';
    document.getElementById('btn-i').disabled = false;
    setTimeout(sync, 1500);
  }

  function render() {
    const m = parseInt(monthFilter.value);
    const filterM = (l) => l.filter(x => {
        let d = x.fecha || x.date;
        if(!d) return false;
        let idx = d.includes('T') ? new Date(d).getMonth() : parseInt(d.split('/')[1])-1;
        return idx === m;
    });

    const fG = filterM(data.gastos);
    const fI = filterM(data.ingresos);

    const sum = (l, p) => l.filter(x => (x.persona || '').toLowerCase() === p).reduce((a,b) => a + parseFloat(b.monto || 0), 0);

    const tot = { gj: sum(fG, 'jose'), gd: sum(fG, 'desi'), ij: sum(fI, 'jose'), id: sum(fI, 'desi') };

    document.getElementById('in-jose').textContent = '$' + tot.ij.toLocaleString();
    document.getElementById('in-desi').textContent = '$' + tot.id.toLocaleString();
    document.getElementById('in-total').textContent = '$' + (tot.ij + tot.id).toLocaleString();
    document.getElementById('out-jose').textContent = '$' + tot.gj.toLocaleString();
    document.getElementById('out-desi').textContent = '$' + tot.gd.toLocaleString();
    document.getElementById('out-total').textContent = '$' + (tot.gj + tot.gd).toLocaleString();

    const list = document.getElementById('main-list');
    const items = currentTab === 'gastos' ? fG : fI;
    list.innerHTML = items.reverse().map(x => `
      <div class="item g-${(x.persona || 'jose').toLowerCase()}">
        <div>
          <div style="font-weight:bold">${x.descripcion || x.concept || x.desc || 'Item'}</div>
          <div style="font-size:11px; color:var(--muted)">${x.categoria || 'Ingreso'} · ${(x.persona || 'JOSE').toUpperCase()}</div>
        </div>
        <div style="font-family:'DM Mono'; font-weight:bold">$${parseFloat(x.monto || 0).toLocaleString()}</div>
      </div>
    `).join('');
  }
  sync();
  setInterval(sync, 30000);
</script>
</body>
</html>
