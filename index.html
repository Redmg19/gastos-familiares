<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>José & Desi: Centro de Control</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surf: #161616; --bord: #262626;
    --jose: #e8c97d; --desi: #7db8e8; --text: #f0ede8; --muted: #777;
    --accent: #2ecc71; --danger: #e87d7d; --warn: #f39c12;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; padding-bottom: 90px; }
  .view { display: none; padding: 20px; animation: fadeIn 0.2s; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  
  nav { position: fixed; bottom: 0; width: 100%; background: var(--surf); border-top: 1px solid var(--bord); display: grid; grid-template-columns: 1fr 1fr 1fr; height: 75px; z-index: 100; }
  .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); font-size: 10px; cursor: pointer; }
  .nav-item.active { color: var(--desi); font-weight: bold; }

  .card { background: var(--surf); border: 1px solid var(--bord); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
  input, select, button { font-family: inherit; }
  input, select { background: var(--bg); border: 1px solid var(--bord); border-radius: 12px; padding: 12px; color: var(--text); width: 100%; margin-bottom: 10px; font-size: 16px; }
  
  /* HÁBITOS */
  .h-row { margin-bottom: 15px; }
  .h-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .h-bar-bg { height: 8px; background: #222; border-radius: 4px; overflow: hidden; display: flex; gap: 2px; }
  .h-day { flex: 1; background: #333; transition: 0.3s; cursor: pointer; }
  .h-day.active { background: var(--accent); }
  .h-day.off { background: #111; pointer-events: none; opacity: 0.2; }
  .h-bar-fill { height: 100%; background: var(--accent); transition: 0.5s; }

  /* AGENDA */
  .ag-item { border-left: 4px solid var(--muted); padding: 10px 15px; background: var(--surf); margin-bottom: 8px; border-radius: 0 12px 12px 0; display: flex; justify-content: space-between; align-items: center; }
  .ag-item.jose { border-left-color: var(--jose); }
  .ag-item.desi { border-left-color: var(--desi); }
  
  .btn-save { background: var(--accent); color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; }
  .tab-btn { flex: 1; padding: 10px; border: 1px solid var(--bord); background: var(--surf); color: var(--muted); border-radius: 10px; font-size: 12px; }
  .tab-btn.active { background: var(--text); color: var(--bg); font-weight: bold; }
</style>
</head>
<body>

<div id="view-finanzas" class="view active">
  <div class="card" style="text-align:center;">
    <div id="neto-total" style="font-size:42px; font-weight:bold; margin-bottom:5px;">$0</div>
    <div style="font-size:12px; color:var(--muted); text-transform:uppercase;">Balance ingresos reales</div>
    <div style="height:10px; background:#222; border-radius:5px; margin:15px 0; overflow:hidden;">
        <div id="surv-bar" style="height:100%; width:0%; transition:1s;"></div>
    </div>
  </div>
  
  <div class="card">
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button id="f-jose" class="tab-btn active" onclick="setUser('jose')">JOSÉ</button>
        <button id="f-desi" class="tab-btn" onclick="setUser('desi')">DESI</button>
    </div>
    <input type="text" id="f-desc" placeholder="Descripción">
    <input type="number" id="f-amount" placeholder="Monto $">
    <select id="f-cat">
        <optgroup label="📌 Pagos Fijos">
            <option>Diezmo 🙏</option><option>Renta 🏠</option><option>Mercado 🛒</option>
            <option>Eloy 👶</option><option>Camioneta (Ahorro) 🚘</option><option>TikTok Ads 📱</option>
        </optgroup>
        <optgroup label="🏠 Servicios">
            <option>Gasolina ⛽</option><option>Luz 💡</option><option>Agua Potable 💧</option>
            <option>Agua Llave 🚿</option><option>Gas 🔥</option><option>Internet 🌐</option>
            <option>Teléfono José 📞</option><option>Teléfono Desi 📞</option><option>Seguro Carro 🛡️</option><option>Lavado Carro 🧼</option>
        </optgroup>
        <optgroup label="💸 Variables">
            <option>Estacionamiento 🅿️</option><option>Salidas Familiares 👨‍👩‍👧</option><option>Corte de Pelo ✂️</option>
        </optgroup>
        <option value="INGRESO">↗️ REGISTRAR INGRESO</option>
    </select>
    <button class="btn-save" onclick="saveFinance()">GUARDAR EN FINANZAS</button>
  </div>
</div>

<div id="view-prod" class="view">
  <h3>Hábitos Semanales</h3>
  <div id="habit-list" class="card"></div>

  <h3>Próximos 7 Días</h3>
  <div id="agenda-list"></div>
  
  <div class="card" style="margin-top:20px;">
    <h4 style="margin-top:0">Nuevo Evento</h4>
    <input type="date" id="ag-date">
    <input type="time" id="ag-time">
    <input type="text" id="ag-act" placeholder="¿Qué toca hacer?">
    <button class="btn-save" style="background:var(--desi)" onclick="saveAgenda()">AGREGAR A AGENDA</button>
  </div>
</div>

<div id="view-historial" class="view">
  <h3>Movimientos Mensuales</h3>
  <div id="full-history"></div>
</div>

<nav>
  <div class="nav-item active" id="n-finanzas" onclick="nav('finanzas')">💵<br>Finanzas</div>
  <div class="nav-item" id="n-prod" onclick="nav('prod')">⚡<br>Productividad</div>
  <div class="nav-item" id="n-historial" onclick="nav('historial')">📜<br>Historial</div>
</nav>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyBhXZ8n1O6fyXh4EGNXIJN8-QixT7pWtSqD9imWc81Z6sSNLPefNyidmT5E_EMCUz4/exec";
let db = { gastos:[], ingresos:[], agenda:[], habitos:[] };
let curUser = 'jose';

const HABIT_DEF = [
    {n: "Ajedrez Amelia", d:[1,2,3,4,5]},
    {n: "Gimnasio", d:[1,2,3,4,5]},
    {n: "Lavar Chevy", d:[2]},
    {n: "Devocional", d:[1,2,3,4,5,6]},
    {n: "Lectura 20m", d:[1,2,3,4,5]},
    {n: "Niños Parque", d:[3,6]},
    {n: "JPC Viernes", d:[5]},
    {n: "Edición Mateo", d:[1,3]},
    {n: "Edición VIDA", d:[2,4]}
];

async function sync() {
    try {
        const r = await fetch(URL+"?t="+Date.now());
        db = await r.json();
        render();
    } catch(e) { console.error(e); }
}

function render() {
    // FINANZAS
    const tG = db.gastos.reduce((a,b)=>a+parseFloat(b.monto||0),0);
    const tI = db.ingresos.reduce((a,b)=>a+parseFloat(b.monto||0),0);
    const bal = tI - tG;
    document.getElementById('neto-total').textContent = `$${bal.toLocaleString()}`;
    document.getElementById('neto-total').style.color = bal < 0 ? 'var(--danger)' : 'var(--accent)';
    const perc = tI > 0 ? (tG/tI)*100 : 0;
    const sBar = document.getElementById('surv-bar');
    sBar.style.width = Math.min(perc, 100)+'%';
    sBar.style.background = perc > 90 ? 'var(--danger)' : (perc > 70 ? 'var(--warn)' : 'var(--accent)');

    // HÁBITOS
    const monday = getMonday(new Date()).toLocaleDateString('es-MX');
    document.getElementById('habit-list').innerHTML = HABIT_DEF.map(h => {
        const saved = db.habitos.find(x => x.habito === h.n && x.fecha_inicio === monday) || {};
        let done = 0; h.d.forEach(d => { if(saved['lmmijvsd'[d-1]]) done++; });
        const p = Math.round((done/h.d.length)*100);
        return `
            <div class="h-row">
                <div class="h-label"><span>${h.n}</span> <b style="color:${p>=80?'var(--accent)':'var(--muted)'}">${p}%</b></div>
                <div class="h-bar-bg">
                    ${[1,2,3,4,5,6,7].map(d => {
                        const isOff = !h.d.includes(d);
                        const dayKey = ['l','m','mi','j','v','s','d'][d-1];
                        const isActive = saved[dayKey] === "OK";
                        return `<div class="h-day ${isOff?'off':(isActive?'active':'')}" onclick="toggleHabit('${h.n}','${dayKey}',${isActive})"></div>`;
                    }).join('')}
                </div>
            </div>
        `;
    }).join('');

    // AGENDA (Próximos 7 días)
    const hoy = new Date();
    const agendaHtml = db.agenda.filter(a => {
        const d = new Date(a.fecha);
        return d >= hoy.setHours(0,0,0,0) && d <= new Date().setDate(hoy.getDate()+7);
    }).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha)).map(a => `
        <div class="ag-item ${a.persona.toLowerCase()}">
            <div>
                <div style="font-size:10px; color:var(--muted)">${a.fecha} - ${a.hora}</div>
                <div style="font-weight:bold">${a.actividad}</div>
            </div>
            <button onclick="del('Agenda','${a.id}')" style="background:none; border:none; color:var(--danger)">✕</button>
        </div>
    `).join('');
    document.getElementById('agenda-list').innerHTML = agendaHtml || '<div style="color:var(--muted); text-align:center">Sin compromisos esta semana</div>';
}

async function toggleHabit(name, day, current) {
    const monday = getMonday(new Date()).toLocaleDateString('es-MX');
    const colMap = {l:4, m:5, mi:6, j:7, v:8, s:9, d:10};
    await fetch(URL, {method:'POST', mode:'no-cors', body:JSON.stringify({
        action:'update_habito', habito:name, fecha_inicio:monday, colIdx:colMap[day], val:current?"":"OK"
    })});
    sync();
}

async function saveFinance() {
    const isInc = document.getElementById('f-cat').value === "INGRESO";
    const body = {
        action: isInc ? 'add_ingreso' : 'add_gasto',
        id: Date.now(), person: curUser,
        amount: document.getElementById('f-amount').value,
        [isInc?'concept':'desc']: document.getElementById('f-desc').value,
        cat: document.getElementById('f-cat').value
    };
    await fetch(URL, {method:'POST', mode:'no-cors', body:JSON.stringify(body)});
    sync();
}

async function saveAgenda() {
    const body = {
        action: 'add_agenda', id: Date.now(), person: curUser,
        date: document.getElementById('ag-date').value,
        time: document.getElementById('ag-time').value,
        activity: document.getElementById('ag-act').value
    };
    await fetch(URL, {method:'POST', mode:'no-cors', body:JSON.stringify(body)});
    sync();
}

async function del(sheet, id) { if(confirm("¿Borrar?")) { await fetch(URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:'delete', sheet, id})}); sync(); } }

function nav(v) {
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
    document.getElementById('view-'+v).classList.add('active');
    document.getElementById('n-'+v).classList.add('active');
}

function setUser(u) {
    curUser = u;
    document.getElementById('f-jose').classList.toggle('active', u==='jose');
    document.getElementById('f-desi').classList.toggle('active', u==='desi');
}

function getMonday(d) { d = new Date(d); const day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1); return new Date(d.setDate(diff)); }

sync();
</script>
</body>
</html>
